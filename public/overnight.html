<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAAST – Pernoite</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">🌙</div>
      <div>
        <div class="sidebar-title">Pernoite</div>
        <div class="sidebar-sub">Controle de pernoite</div>
      </div>
    </div>

    <div id="page-nav"></div>

    <div class="sidebar-body">

      <div class="field-label">Grupo</div>
      <select id="groupSelect" class="input-field">
        <option value="">Carregando grupos...</option>
      </select>

      <div class="field-label">Período</div>
      <div class="date-row">
        <input id="dateStart" type="date" class="input-field" />
        <input id="dateEnd"   type="date" class="input-field" />
      </div>

      <button id="btnGenerate" class="btn-primary">🔍 Gerar Relatório</button>
      <button id="btnExportXlsx" class="btn-secondary" style="display:none">⬇ Exportar XLSX</button>

      <div id="reportError" class="error-msg" style="display:none"></div>

      <div style="margin-top:10px;overflow-x:auto">
        <table class="overnight-table" id="reportTable" style="display:none">
          <thead>
            <tr>
              <th>Placa</th>
              <th>Data</th>
              <th>Situação</th>
              <th>Local</th>
            </tr>
          </thead>
          <tbody id="reportTbody"></tbody>
        </table>
      </div>

    </div>
  </aside>

  <!-- MAP -->
  <main class="map-container">
    <div id="overnight-map" style="width:100%;height:100%"></div>
    <div id="loadingOverlay" class="loading-overlay" style="display:none">
      <div class="loading-spinner"></div>
      <div class="loading-text">Gerando relatório...</div>
    </div>
  </main>

</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/overnight-page.js"></script>
<script>initNav('overnight');</script>
</body>
</html>
