<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="RAAST — Auditoria: verifique automaticamente regras de pernoite e alertas de fim de semana na frota.">
  <title>RAAST — Auditoria</title>

  <!-- Favicon SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563eb'/><text y='22' x='5' font-size='20'>🌙</text></svg>">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">🛡️</div>
      <div>
        <div class="sidebar-title">RAAST</div>
        <div class="sidebar-sub">Auditoria de Frota</div>
      </div>
    </div>

    <div id="page-nav"></div>

    <div class="sidebar-body">

      <div class="field-label">Grupo</div>
      <select id="groupSelect" class="input-field">
        <option value="">Carregando grupos...</option>
      </select>

      <div class="field-label">Período</div>
      <div class="date-row">
        <input id="dateStart" type="date" class="input-field" />
        <input id="dateEnd"   type="date" class="input-field" />
      </div>

      <button id="btnGenerate" class="btn-primary">🔍 Gerar Relatório</button>
      <button id="btnExportXlsx" class="btn-secondary" style="display:none">⬇ Exportar XLSX</button>

      <div id="reportError" class="error-msg" style="display:none"></div>

      <div style="margin-top:10px;overflow-x:auto">
        <table class="overnight-table" id="reportTable" style="display:none">
          <thead>
            <tr>
              <th>Placa</th>
              <th>Data</th>
              <th>Situação</th>
              <th>Local</th>
            </tr>
          </thead>
          <tbody id="reportTbody"></tbody>
        </table>
      </div>

    </div>
  </aside>

  <!-- MAP -->
  <main class="map-container">
    <div id="overnight-map" style="width:100%;height:100%"></div>
    <div id="loadingOverlay" class="loading-overlay" style="display:none">
      <div class="loading-spinner"></div>
      <div class="loading-text">Gerando relatório...</div>
      <div id="progressContainer" style="margin-top:16px;width:260px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:6px">
          <span id="progressText">0 / 0</span>
          <span id="progressPct">0%</span>
        </div>
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:5px;height:5px;overflow:hidden">
          <div id="progressBar" style="width:0%;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-hover));border-radius:5px;transition:width 0.25s ease"></div>
        </div>
        <div id="progressEta" style="margin-top:6px;font-size:10px;color:var(--text-muted);text-align:center"></div>
      </div>
    </div>
  </main>

</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/overnight-page.js"></script>
<script>initNav('overnight');</script>
</body>
</html>
